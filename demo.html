<!DOCTYPE html>
<html lang="en" data-theme="dark" data-lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo — ArrivalX Settlement Layer</title>
<link rel="stylesheet" href="css/style.css">
<style>
/* ===== Demo-specific styles ===== */
.demo-page {
  padding-top: 70px;
  min-height: 100vh;
}
.demo-container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 24px 60px;
}

/* Scenario selector */
.scenario-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 12px;
  margin-bottom: 32px;
}
.scenario-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
}
.scenario-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.scenario-card.active {
  border-color: var(--accent);
  background: linear-gradient(135deg, rgba(0,255,136,0.08), rgba(0,0,0,0.3));
  box-shadow: 0 0 20px rgba(0,255,136,0.1);
}
.scenario-card .sc-icon { font-size: 1.5rem; margin-bottom: 4px; }
.scenario-card .sc-title { font-size: 0.9rem; font-weight: 600; color: var(--text); }
.scenario-card .sc-desc { font-size: 0.78rem; color: var(--text-secondary); margin-top: 2px; line-height: 1.4; }
.scenario-card .sc-protocol {
  display: inline-block;
  font-size: 0.68rem;
  padding: 1px 8px;
  border-radius: 4px;
  background: rgba(0,255,136,0.1);
  color: var(--accent);
  margin-top: 4px;
  font-weight: 500;
}

/* Demo split layout */
.demo-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
@media (max-width: 860px) { .demo-layout { grid-template-columns: 1fr; } }

/* Tablet: 2-col scenario cards */
@media (max-width: 767px) {
  .scenario-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .scenario-card { padding: 10px 12px; }
  .scenario-card .sc-title { font-size: 0.82rem; }
  .scenario-card .sc-desc { font-size: 0.7rem; }
  .demo-container { padding: 0 12px 40px; }
  .demo-page { padding-top: 60px; }
}
/* Phone: single column scenarios, tighter everything */
@media (max-width: 600px) {
  .scenario-grid { grid-template-columns: 1fr; }
  .demo-controls { flex-direction: column; }
  .demo-controls select { width: 100%; }
  .demo-controls input { width: 100%; }
  .demo-controls button { width: 100%; }
  .flow-panel { padding: 12px; min-height: 300px; }
  .output-panel { padding: 12px; }
  .flow-step { padding: 8px 10px; font-size: 0.75rem; }
  .demo-log { font-size: 0.68rem; min-height: 180px; max-height: 300px; padding: 8px; }
  .scenario-card .sc-desc { white-space: normal; }
  .fee-table { font-size: 0.72rem; }
  .scenario-banner { font-size: 0.78rem; padding: 10px 14px; }
  .route-node { font-size: 0.68rem; padding: 3px 8px; }
  .demo-result { font-size: 0.75rem; padding: 10px 12px; }
}

/* Left panel - flow viz */
.flow-panel {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  min-height: 400px;
}
.flow-panel h3 { margin-bottom: 16px; font-size: 1rem; }

/* Flow diagram */
.flow-steps {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 20px;
}
.flow-step {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 8px;
  background: rgba(255,255,255,0.02);
  border: 1px solid transparent;
  transition: all 0.4s;
  font-size: 0.85rem;
  color: var(--text-secondary);
}
.flow-step.active {
  border-color: var(--accent);
  background: rgba(0,255,136,0.06);
  color: var(--text);
}
.flow-step.done {
  border-color: rgba(0,255,136,0.3);
  background: rgba(0,255,136,0.04);
  color: var(--text);
}
.flow-step.fail {
  border-color: #ff4444;
  background: rgba(255,68,68,0.06);
  color: #ff6666;
}
.flow-step .step-num {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  background: rgba(255,255,255,0.05);
  flex-shrink: 0;
}
.flow-step.active .step-num { background: var(--accent); color: #000; }
.flow-step.done .step-num { background: var(--accent); color: #000; }
.flow-step.fail .step-num { background: #ff4444; color: #fff; }
.flow-step .step-icon { font-size: 1rem; }
.flow-step .step-label { flex: 1; }
.flow-step .step-status { font-size: 0.75rem; }

/* Right panel - output & controls */
.output-panel {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  display: flex;
  flex-direction: column;
}
.output-panel h3 { margin-bottom: 12px; font-size: 1rem; }

/* Controls */
.demo-controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.demo-controls select, .demo-controls input {
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 8px 12px;
  font-size: 0.8rem;
}
.demo-controls select { flex: 1; min-width: 120px; }
.demo-controls input { width: 100px; }
.demo-controls button {
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: 6px;
  padding: 8px 20px;
  font-weight: 600;
  cursor: pointer;
  font-size: 0.8rem;
  transition: opacity 0.2s;
}
.demo-controls button:hover { opacity: 0.85; }
.demo-controls button:disabled { opacity: 0.4; cursor: not-allowed; }

/* Log output */
.demo-log {
  flex: 1;
  background: #0a0a0a;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-family: 'SF Mono', 'Cascadia Code', monospace;
  font-size: 0.75rem;
  line-height: 1.6;
  overflow-y: auto;
  min-height: 260px;
  max-height: 400px;
}
.log-line {
  padding: 2px 0;
  opacity: 0;
  animation: fadeIn 0.3s forwards;
}
.log-line .ts { color: #666; margin-right: 8px; }
.log-line.info { color: #9bb; }
.log-line.success { color: var(--accent); }
.log-line.warn { color: #ffaa44; }
.log-line.fail { color: #ff4444; }
.log-line.highlight { color: #fff; background: rgba(0,255,136,0.05); padding: 2px 6px; border-radius: 4px; }

/* Result card */
.demo-result {
  margin-top: 12px;
  padding: 12px 16px;
  border-radius: 8px;
  font-size: 0.82rem;
  line-height: 1.6;
  display: none;
}
.demo-result.show { display: block; }
.demo-result.success {
  background: rgba(0,255,136,0.06);
  border: 1px solid rgba(0,255,136,0.2);
  color: var(--accent);
}
.demo-result.fail {
  background: rgba(255,68,68,0.06);
  border: 1px solid rgba(255,68,68,0.2);
  color: #ff6666;
}
.demo-result .res-row { display: flex; justify-content: space-between; padding: 2px 0; }
.demo-result .res-label { color: var(--text-secondary); }
.demo-result .res-value { color: var(--text); font-weight: 600; }

@keyframes fadeIn { to { opacity: 1; } }

/* Scenario description banner */
.scenario-banner {
  background: linear-gradient(135deg, rgba(0,255,136,0.05), rgba(0,0,0,0.2));
  border: 1px solid rgba(0,255,136,0.1);
  border-radius: 10px;
  padding: 12px 18px;
  margin-bottom: 16px;
  font-size: 0.85rem;
  line-height: 1.5;
}
.scenario-banner strong { color: var(--accent); }

/* Fee breakdown */
.fee-table {
  width: 100%;
  font-size: 0.8rem;
  border-collapse: collapse;
  margin-top: 8px;
}
.fee-table th {
  text-align: left;
  padding: 4px 8px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  font-weight: 500;
}
.fee-table td {
  padding: 4px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.fee-table td:last-child { text-align: right; font-weight: 600; }
.fee-table .total td { border-top: 1px solid var(--accent); color: var(--accent); font-weight: 700; }

/* Route visualization */
.route-viz {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
  margin: 8px 0;
}
.route-node {
  padding: 4px 10px;
  border-radius: 6px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  font-size: 0.75rem;
}
.route-node.active-node {
  border-color: var(--accent);
  background: rgba(0,255,136,0.06);
  color: var(--accent);
}
.route-arrow { color: var(--text-secondary); font-size: 0.7rem; }

/* Auto mode toggle */
.auto-toggle {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.78rem;
  color: var(--text-secondary);
  cursor: pointer;
}
.auto-toggle input { accent-color: var(--accent); }

/* Compare mode */
.compare-table {
  width: 100%;
  font-size: 0.78rem;
  border-collapse: collapse;
  margin-top: 8px;
}
.compare-table th {
  text-align: left;
  padding: 6px 8px;
  font-weight: 500;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
}
.compare-table td {
  padding: 6px 8px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.compare-table td:last-child { text-align: right; }
</style>
</head>

    counterparty: 'saas',

    steps: [
      { icon: '🤖', en: 'Agent initiates $5,000 payment', zh: 'Agent 发起 $5,000 支付' },

    ],

    fees: [],

    fail: true
  },
  {
    id: 'batch',
    icon: '📦',
    protocol: 'MPP+AP2',

    descEn: '50 micro-payments aggregated into a single on-chain settlement.',
    descZh: '50 笔微支付汇总为单次链上结算。',
    bannerEn: '<strong>📦 Batch Settlement:</strong> 50 agents make $0.50 micro-payments → Aggregated = $25 → Single on-chain tx → $22.49 net to merchant after fees.',
    bannerZh: '<strong>📦 批量结算：</strong>50 个 Agent 各支付 $0.50 → 汇总 $25 → 单次链上交易 → 商户净收 $22.49。',
    counterparty: 'saas',
    jurisdiction: 'CA',
    steps: [
      { icon: '📦', en: '50 micro-payments received ($0.50 each)', zh: '收到 50 笔微支付（每笔 $0.50）' },
      { icon: '🔗', en: 'ArrivalX aggregates batch', zh: 'ArrivalX 汇总批量' },
      { icon: '🔍', en: 'Batch compliance screening', zh: '批量合规筛查' },
      { icon: '🌐', en: 'Route through CA (FINTRAC MSB)', zh: '路由至加拿大 (FINTRAC MSB)' },
      { icon: '💰', en: 'Settle: 50tx → 1 on-chain tx', zh: '结算：50 笔 → 1 次链上交易' },
      { icon: '✅', en: 'Merchant receives net settlement', zh: '商户收到净结算款' }
    ],
    route: ['50 Agents', 'ArrivalX Aggregator', 'FINTRAC MSB', 'Merchant'],
    fees: [
      { labelEn: 'Per-tx processing (×50)', labelZh: '单笔处理费 (×50)', pct: '—', flat: '$2.50 (50×$0.05)', usd: true },
      { labelEn: 'Batch compliance', labelZh: '批量合规', pct: '—', flat: '$0.05', usd: true, note: t('(bulk discount)', '(批量折扣)') },
      { labelEn: 'On-chain settlement', labelZh: '链上结算', pct: '—', flat: '$0.01', usd: true },
      { labelEn: 'Savings vs individual', labelZh: '相比单笔节省', pct: '—', flat: '-$2.44', usd: true, save: true }
    ],
    resultEn: '✅ 50 tx → 1 tx. Saved $2.44 in gas fees. Net: $22.49 to merchant.',
    resultZh: '✅ 50 笔 → 1 笔。节省 $2.44 Gas 费。商户净收 $22.49。',
  }
];

const COUNTERPARTIES = {
  api: 'api.dataprovider.io',
  compute: 'gpu.rent',
  agent: 'agent.market',
  saas: 'saas.vendor.io'
};

// State
let activeScenario = 0;
let simRunning = false;
let simTimer = null;

// Initialize
function init() {
  renderScenarios();
  selectScenario(0);
}

function renderScenarios() {
  const grid = document.getElementById('scenarioGrid');
  grid.innerHTML = '';
  SCENARIOS.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'scenario-card' + (i === 0 ? ' active' : '');
    card.dataset.index = i;
    card.innerHTML = `
      <div class="sc-icon">${s.icon}</div>
      <div class="sc-title">${t(s.titleEn, s.titleZh)}</div>
      <div class="sc-desc">${t(s.descEn, s.descZh)}</div>
      <span class="sc-protocol">${s.protocol}</span>
    `;
    card.onclick = () => selectScenario(i);
    grid.appendChild(card);
  });
}

function selectScenario(i) {
  activeScenario = i;
  document.querySelectorAll('.scenario-card').forEach((c, j) => {
    c.classList.toggle('active', j === i);
  });
  const s = SCENARIOS[i];
  document.getElementById('scenarioBanner').innerHTML = t(s.bannerEn, s.bannerZh);
  renderFlowSteps(s);
  resetDemo();
}

function renderFlowSteps(s) {
  const container = document.getElementById('flowSteps');
  container.innerHTML = '';
  s.steps.forEach((step, i) => {
    const div = document.createElement('div');
    div.className = 'flow-step';
    div.id = 'fs-' + i;
    div.innerHTML = `
      <span class="step-num">${i + 1}</span>
      <span class="step-icon">${step.icon}</span>
      <span class="step-label">${t(step.en, step.zh)}</span>
      <span class="step-status" id="fs-status-${i}"></span>
    `;
    container.appendChild(div);
  });
}

function resetDemo() {
  if (simTimer) { clearTimeout(simTimer); simTimer = null; }
  simRunning = false;
  document.getElementById('demoRunBtn').disabled = false;
  document.getElementById('demoRunBtn').textContent = t('▶ Run Simulation', '▶ 运行模拟');
  document.getElementById('demoResult').className = 'demo-result';
  document.getElementById('demoResult').style.display = 'none';
  document.getElementById('demoLog').innerHTML = '<div class="log-line"><span class="ts">⏎</span> ' + t('Select a scenario and run the simulation.', '选择场景后运行模拟。') + '</div>';
  document.getElementById('routeViz').innerHTML = '';
  document.getElementById('feeBreakdown').innerHTML = '';
  document.querySelectorAll('.flow-step').forEach(el => { el.className = 'flow-step'; });
  document.querySelectorAll('.flow-step .step-status').forEach(el => { el.textContent = ''; });
}

function renderRoute(s) {
  const viz = document.getElementById('routeViz');
  viz.innerHTML = '<div style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:6px;font-weight:500;">' + t('📍 Route', '📍 路由') + '</div><div class="route-viz">';
  s.route.forEach((node, i) => {
    if (i > 0) viz.innerHTML += '<span class="route-arrow">→</span>';
    viz.innerHTML += '<span class="route-node" id="rn-' + i + '">' + node + '</span>';
  });
  viz.innerHTML += '</div>';
}

function renderFeeTable(s) {
  if (!s.fees.length) {
    document.getElementById('feeBreakdown').innerHTML = '';
    return;
  }
  const totalUsd = s.fees.reduce((sum, f) => {
    const flatMatch = f.flat.match(/[\d.]+/);
    return sum + (flatMatch ? parseFloat(flatMatch[0]) : 0);
  }, 0);
  const totalPct = s.fees.reduce((sum, f) => {
    const pctMatch = f.pct.match(/[\d.]+/);
    return sum + (pctMatch ? parseFloat(pctMatch[0]) : 0);
  }, 0);

  const container = document.getElementById('feeBreakdown');
  let html = '<div style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:6px;font-weight:500;">' + t('💰 Fee Breakdown', '💰 费用明细') + '</div>';
  html += '<table class="fee-table"><tr><th>' + t('Item', '项目') + '</th><th>' + t('Fee', '费率') + '</th></tr>';
  s.fees.forEach(f => {
    const label = t(f.labelEn, f.labelZh);
    const feeStr = [f.pct, f.flat].filter(Boolean).join(' + ');
    html += '<tr><td>' + label + (f.note ? ' <span style="color:#999;font-size:0.7rem">' + f.note + '</span>' : '') +
      '</td><td style="' + (f.save ? 'color:var(--accent);' : '') + '">' + feeStr + '</td></tr>';
  });
  html += '<tr class="total"><td>' + t('Total Fees', '总费用') + '</td><td>' +
    (totalPct > 0 ? totalPct.toFixed(1) + '%' : '') + (totalPct > 0 && totalUsd > 0 ? ' + ' : '') +
    (totalUsd > 0 ? '$' + totalUsd.toFixed(2) : '') + '</td></tr>';
  html += '</table></div>';
  container.innerHTML = html;
}

// Demo runner
function runDemo() {
  if (simRunning) return;
  const s = SCENARIOS[activeScenario];
  const amount = parseFloat(document.getElementById('demoAmount').value);
  const autoMode = document.getElementById('autoMode').checked;
  const cname = COUNTERPARTIES[s.counterparty];
  const log = document.getElementById('demoLog');
  const result = document.getElementById('demoResult');
  const btn = document.getElementById('demoRunBtn');

  simRunning = true;
  btn.disabled = true;
  btn.textContent = t('⏳ Running...', '⏳ 运行中...');
  result.style.display = 'none';
  result.className = 'demo-result';
  log.innerHTML = '';
  document.querySelectorAll('.flow-step').forEach(el => { el.className = 'flow-step'; });
  document.querySelectorAll('.flow-step .step-status').forEach(el => { el.textContent = ''; });

  renderRoute(s);
  renderFeeTable(s);

  const doLog = (msg, cls) => {
    const d = document.createElement('div');
    d.className = 'log-line ' + cls;
    const ts = new Date().toLocaleTimeString();
    d.innerHTML = '<span class="ts">' + ts + '</span>' + msg;
    log.appendChild(d);
    log.scrollTop = log.scrollHeight;
  };

  const doStep = (index, delay) => {
    return new Promise(resolve => {
      simTimer = setTimeout(() => {
        const step = s.steps[index];
        const el = document.getElementById('fs-' + index);
        const status = document.getElementById('fs-status-' + index);

        if (s.fail && index === s.steps.length - 1) {
          el.className = 'flow-step fail';
          status.textContent = '❌';
        } else {
          el.className = 'flow-step done';
          status.textContent = '✅';
        }
        doLog(step.icon + ' ' + t(step.en, step.zh), index === 3 && s.fail ? 'warn' : 'info');
        resolve();
      }, delay || 600);
    });
  };

  const run = async () => {
    doLog(t('🚀 Scenario: ', '🚀 场景：') + t(s.titleEn, s.titleZh), 'highlight');
    doLog(t('📤 Amount: ', '📤 金额：') + '$' + amount.toFixed(2) + ' USDC → ' + cname, 'info');

    await doStep(0, autoMode ? 400 : 0);
    if (autoMode) await doStep(1);
    else { simTimer = setTimeout(async () => { await doStep(1); }, 400); return; }

    await doStep(2);
    await doStep(3);

    if (s.fail) {
      // Special: compliance fail path
      await doStep(4);
      await doStep(5);
      simTimer = setTimeout(() => {
        result.className = 'demo-result fail show';
        result.innerHTML = '<strong>' + t('⚠️ Transaction Blocked', '⚠️ 交易已拦截') + '</strong><br>' + t(s.resultEn, s.resultZh);
        btn.disabled = false;
        btn.textContent = t('▶ Run Again', '▶ 再次运行');
        simRunning = false;
      }, 600);
      return;
    }

    await doStep(4);

    // Final settlement step with economics
    simTimer = setTimeout(() => {
      const settlePct = 0.995;
      const feePct = s.fees.reduce((sum, f) => {
        const p = parseFloat(f.pct);
        return sum + (isNaN(p) ? 0 : p);
      }, 0);
      const settleAmount = (amount * settlePct).toFixed(2);
      const totalFee = (amount - amount * settlePct).toFixed(2);

      const step = s.steps[5];
      document.getElementById('fs-5').className = 'flow-step done';
      document.getElementById('fs-status-5').textContent = '✅';
      doLog(step.icon + ' ' + t(step.en, step.zh), 'success');

      setTimeout(() => {
        // Show route nodes active
        document.querySelectorAll('.route-node').forEach((el, i) => {
          setTimeout(() => { el.classList.add('active-node'); }, i * 200);
        });
      }, 200);

      simTimer = setTimeout(() => {
        doLog(t('💵 Settled: ', '💵 已结算：') + '$' + settleAmount + ' USD → ' + cname, 'success');
        doLog(t('💰 Fee: $', '💰 费用：$') + totalFee + ' (' + (feePct > 0 ? feePct.toFixed(1) + '%' : 'flat') + ')', 'info');
        doLog(t('✅ Transaction complete. Compliant.', '✅ 交易完成。合规。'), 'success');

        // Show result
        result.className = 'demo-result success show';
        result.innerHTML = '<strong>' + t('✅ Settlement Complete', '✅ 结算完成') + '</strong><br>' +
          '<div class="res-row"><span class="res-label">' + t('Gross', '毛额') + '</span><span class="res-value">$' + amount.toFixed(2) + ' USDC</span></div>' +
          '<div class="res-row"><span class="res-label">' + t('Fee', '费用') + '</span><span class="res-value">$' + totalFee + ' (' + (feePct > 0 ? feePct.toFixed(1) + '%' : 'flat') + ')</span></div>' +
          '<div class="res-row"><span class="res-label">' + t('Net Settled', '净结算') + '</span><span class="res-value" style="color:var(--accent)">$' + settleAmount + ' USD</span></div>' +
          '<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,255,136,0.1);font-size:0.75rem;color:var(--text-secondary)">' +
          t(s.resultEn, s.resultZh) + '</div>';

        btn.disabled = false;
        btn.textContent = t('▶ Run Again', '▶ 再次运行');
        simRunning = false;
      }, autoMode ? 400 : 0);
    }, autoMode ? 600 : 0);
  };

  // Handle non-auto mode by stepping sequentially
  const chainSteps = () => {
    let step = 0;
    const nextStep = () => {
      if (step >= s.steps.length) return;
      const el = document.getElementById('fs-' + step);
      const status = document.getElementById('fs-status-' + step);
      const stepData = s.steps[step];
      el.className = 'flow-step done';
      status.textContent = '✅';
      doLog(stepData.icon + ' ' + t(stepData.en, stepData.zh), 'info');
      step++;
      if (step < s.steps.length) {
        simTimer = setTimeout(nextStep, 600);
      } else {
        // Show result
        const settleAmount = (amount * 0.995).toFixed(2);
        result.className = 'demo-result success show';
        result.innerHTML = '<strong>' + t('✅ Settlement Complete', '✅ 结算完成') + '</strong><br>' +
          '<div class="res-row"><span class="res-label">' + t('Gross', '毛额') + '</span><span class="res-value">$' + amount.toFixed(2) + ' USDC</span></div>' +
          '<div class="res-row"><span class="res-label">' + t('Net Settled', '净结算') + '</span><span class="res-value" style="color:var(--accent)">$' + settleAmount + ' USD</span></div>';
        btn.disabled = false;
        btn.textContent = t('▶ Run Again', '▶ 再次运行');
        simRunning = false;
      }
    };
    nextStep();
  };

  if (autoMode) {
    run();
  } else {
    doLog(t('🚀 Scenario: ', '🚀 场景：') + t(s.titleEn, s.titleZh), 'highlight');
    doLog(t('📤 Amount: ', '📤 金额：') + '$' + amount + ' USDC → ' + cname, 'info');
    chainSteps();
  }
}

// Init on load
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
